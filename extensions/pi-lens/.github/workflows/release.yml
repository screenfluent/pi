name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      publish_npm:
        description: Publish to npm registry
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      should_release: ${{ steps.meta.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"

          SHOULD_RELEASE=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHOULD_RELEASE=true
          else
            if git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -q '^package.json$'; then
              SHOULD_RELEASE=true
            fi
          fi

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            SHOULD_RELEASE=false
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"

      - name: Verify changelog entry exists
        if: steps.meta.outputs.should_release == 'true'
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          if ! grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            echo "Missing CHANGELOG entry for version $VERSION"
            exit 1
          fi

  release:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        shell: bash
        run: |
          git tag "${{ needs.prepare.outputs.tag }}"
          git push origin "${{ needs.prepare.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true

  publish-npm:
    runs-on: ubuntu-latest
    needs: [prepare, release]
    if: github.event_name == 'workflow_dispatch' && inputs.publish_npm == true && needs.prepare.outputs.should_release == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish
