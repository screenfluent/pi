id: missed-concurrency
language: TypeScript
message: "Missed concurrency — sequential awaits could be parallelized"
severity: warning
note: |
  Sequential awaits in the same block can often be parallelized using Promise.all().
  This improves performance by starting multiple asynchronous operations simultaneously.
  Grade 3.2 — moderate complexity, significant performance gain.
rule:
  all:
    - pattern: await $P1
    - precedes:
        pattern: await $P2
        stopBy: end
        strict: true
    - not:
        inside:
          kind: for_statement
    - not:
        inside:
          kind: while_statement
    - not:
        inside:
          kind: for_in_statement

