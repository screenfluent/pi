id: no-async-promise-executor-js
message: Promise executor functions should not be async.
severity: error
language: JavaScript
rule:
  all:
    - pattern: $A
    - any:
        - kind: function_expression
        - kind: arrow_function
    - regex: ^async
    - inside:
        stopBy: end
        pattern: new Promise($A)
note: Disallow using an async function as a Promise executor
