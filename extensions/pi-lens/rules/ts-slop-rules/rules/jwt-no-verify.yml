---
id: ts-jwt-no-verify
language: TypeScript
severity: warning
message: "Unsafe JWT operation — verification is bypassed"
metadata:
  weight: 4
  category: security
rule:
  any:
    - pattern: "jwt.decode($$$, { noVerify: true })"
    - pattern: "jwt.verify($$$, { ignoreExpiration: true, $$$ })"
    - pattern: "jwt.verify($$$, { ignoreNotBefore: true, $$$ })"
