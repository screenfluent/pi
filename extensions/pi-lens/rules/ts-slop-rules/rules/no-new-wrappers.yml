---
id: ts-no-new-wrappers
language: TypeScript
severity: warning
message: "Do not use 'new' with wrapper objects — use literal primitives instead"
metadata:
  weight: 4
  category: security
rule:
  any:
    - pattern: "new Boolean($$$ARGS)"
    - pattern: "new Number($$$ARGS)"
    - pattern: "new String($$$ARGS)"
