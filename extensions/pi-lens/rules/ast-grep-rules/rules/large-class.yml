id: large-class
language: TypeScript
message: "Large class detected — consider splitting responsibilities"
severity: hint
note: |
  Classes with more than 20 methods are harder to maintain.
  Consider extracting related functionality into separate classes.
  Note: For precise method counts, use complexity metrics.
rule:
  all:
    - kind: class_declaration
    - has:
        field: body
        regex: "(public |private |protected |readonly )?(async )?[a-zA-Z_][a-zA-Z0-9_]*\\s*\\("
