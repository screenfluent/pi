id: no-prototype-builtins
language: TypeScript
message: "Use Object.hasOwn() or Object.prototype.hasOwnProperty.call() instead of calling methods directly on the object"
severity: warning
note: |
  Objects created with Object.create(null) have no prototype and will throw
  TypeError when calling .hasOwnProperty() directly. Use Object.hasOwn()
  or call via Object.prototype.hasOwnProperty.call(obj, prop).
rule:
  any:
    - pattern: $OBJ.hasOwnProperty($PROP)
    - pattern: $OBJ.isPrototypeOf($PROP)
    - pattern: $OBJ.propertyIsEnumerable($PROP)
  not:
    pattern: Object.prototype.hasOwnProperty.call($$$)
