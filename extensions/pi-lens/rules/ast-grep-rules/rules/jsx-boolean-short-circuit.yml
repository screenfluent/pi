id: jsx-boolean-short-circuit
language: Tsx
message: "React JSX && pitfall — potentially renders 0 or NaN"
severity: warning
note: |
  Using && in JSX can lead to unexpected rendering of falsy values like 0 or NaN.
  Fix: use a ternary operator or cast the condition to a boolean.
  Grade 2.9 — low complexity, avoids UI glitches.
rule:
  kind: jsx_expression
  has:
    all:
      - pattern: $COND && $JSX
      - has:
          field: left
          any:
            - kind: number
            - has:
                field: property
                regex: "^length$"
