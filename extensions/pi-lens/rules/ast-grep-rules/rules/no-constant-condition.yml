id: no-constant-condition
language: TypeScript
message: "Unexpected constant condition"
severity: warning
note: |
  A constant expression (for example, a literal) as a test condition
  might be a typo or development trigger for a specific behavior.
rule:
  any:
    - kind: if_statement
      has:
        field: condition
        any:
          - kind: "true"
          - kind: "false"
          - kind: number
          - kind: string
    - kind: ternary_expression
      has:
        field: condition
        any:
          - kind: "true"
          - kind: "false"
          - kind: number
          - kind: string
