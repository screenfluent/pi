id: no-single-char-var
language: TypeScript
message: "Avoid single-character variable names — use descriptive names"
severity: info
note: |
  Single-character variable names reduce readability.
  Exception: loop counters (i, j, k, n) and underscore (_) are acceptable.
rule:
  kind: variable_declarator
  has:
    kind: identifier
    regex: "^[a-df-hm-z]$"  # Excludes i, j, k, n
