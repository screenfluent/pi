id: weak-rsa-key
language: TypeScript
message: "Weak RSA key size — use at least 2048 bits"
severity: error
note: |
  RSA keys smaller than 2048 bits are considered insecure and can be cracked.
  Ensure all generated or used RSA keys have a size of at least 2048.
  Grade 3.9 — high risk, improved security.
rule:
  any:
    - pattern: "crypto.generateKeyPairSync('rsa', { modulusLength: $LEN, $$$ })"
    - pattern: "crypto.generateKeyPair('rsa', { modulusLength: $LEN, $$$ }, $$$)"
constraints:
  LEN:
    regex: "^(512|1024|1536)$"
