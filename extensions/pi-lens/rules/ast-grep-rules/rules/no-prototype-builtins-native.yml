id: no-prototype-builtins-native
language: TypeScript
message: "Use Object.hasOwn() instead of hasOwnProperty() — ES2022 standard"
severity: hint
note: |
  Object.hasOwn() is the modern ES2022 replacement for
  Object.prototype.hasOwnProperty.call(). It's cleaner and handles
  objects created with Object.create(null).
rule:
  all:
    - kind: call_expression
    - has:
        field: function
        kind: member_expression
        has:
          field: property
          regex: "^hasOwnProperty$"
