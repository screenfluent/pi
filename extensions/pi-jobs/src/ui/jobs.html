<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>pi — Jobs Dashboard</title>
<style>{{CSS}}</style>
</head>
<body>
<div class="container">
	<div class="filter-bar">
		<select id="filter-channel" onchange="refresh()">
			<option value="">All channels</option>
			<option value="tui">TUI</option>
			<option value="cron">Cron</option>
			<option value="heartbeat">Heartbeat</option>
			<option value="subagent">Subagent</option>
		</select>
		<select id="filter-period" onchange="refresh()">
			<option value="7">7 days</option>
			<option value="30" selected>30 days</option>
			<option value="90">90 days</option>
		</select>
	</div>

	<div class="grid" id="stats"></div>

	<div class="section">
		<h2>Cost Over Time</h2>
		<div class="chart-wrap" id="cost-chart"></div>
	</div>

	<div class="section">
		<h2>Recent Jobs</h2>
		<div class="table-wrap">
			<table>
				<thead><tr>
					<th>Status</th><th>Channel</th><th>Prompt</th>
					<th>Tokens</th><th>Cost</th><th>Tools</th><th>Duration</th><th>Time</th>
				</tr></thead>
				<tbody id="jobs-table"></tbody>
			</table>
		</div>
	</div>

	<div class="two-col">
		<div class="section">
			<h2>Models</h2>
			<div class="table-wrap">
				<table>
					<thead><tr><th>Model</th><th>Jobs</th><th>Tokens</th><th>Cost</th></tr></thead>
					<tbody id="models-table"></tbody>
				</table>
			</div>
		</div>
		<div class="section">
			<h2>Tools</h2>
			<div class="table-wrap">
				<table>
					<thead><tr><th>Tool</th><th>Calls</th><th>Errors</th><th>Avg Time</th></tr></thead>
					<tbody id="tools-table"></tbody>
				</table>
			</div>
		</div>
	</div>

	<p class="refresh-note">Auto-refreshes every 30s</p>
</div>
<script>{{JS}}</script>
</body>
</html>
