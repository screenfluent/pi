<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>pi</title>
<style>
  :root {
    --bg: #0a0a0f; --bg2: #12121a; --bg3: #1a1a25;
    --fg: #e0e0e8; --fg2: #888898; --fg3: #555568;
    --accent: #7c6ff0; --accent2: #9d8cf0;
    --border: #2a2a3a; --radius: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 14px; line-height: 1.5;
    display: flex; flex-direction: column;
  }

  /* ── Nav bar ─────────────────────────────────────── */
  nav {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 16px;
    height: 44px; flex-shrink: 0; gap: 2px;
    overflow-x: auto; scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }

  .brand {
    color: var(--accent); font-weight: 700; font-size: 18px;
    margin-right: 20px; flex-shrink: 0; cursor: pointer;
    text-decoration: none; letter-spacing: -0.5px;
  }
  .brand:hover { color: var(--accent2); }

  .nav-links { display: flex; gap: 2px; align-items: center; }

  .nav-link {
    color: var(--fg2); text-decoration: none;
    padding: 6px 14px; border-radius: var(--radius);
    font-size: 13px; font-weight: 500;
    white-space: nowrap; cursor: pointer;
    transition: all 0.12s ease;
    border: 1px solid transparent;
  }
  .nav-link:hover {
    background: var(--bg3); color: var(--fg);
    border-color: var(--border);
  }
  .nav-link.active {
    background: var(--accent); color: #fff;
    border-color: var(--accent);
  }

  /* ── Content area ────────────────────────────────── */
  .content { flex: 1; position: relative; }

  iframe {
    width: 100%; height: 100%; border: none;
    position: absolute; top: 0; left: 0;
  }

  /* ── Home view (when no mount selected) ──────────── */
  .home {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 40px 20px;
  }
  .home.hidden { display: none; }
  iframe.hidden { display: none; }

  .home h1 { font-size: 28px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .home p { color: var(--fg2); font-size: 14px; margin-bottom: 32px; }

  .mount-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px; max-width: 720px; width: 100%;
  }
  .mount-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px 20px;
    text-decoration: none; color: var(--fg);
    transition: all 0.15s; display: block; cursor: pointer;
  }
  .mount-card:hover { border-color: var(--accent); background: var(--bg3); }
  .mount-card-name { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
  .mount-card-prefix {
    font-size: 12px; color: var(--accent2);
    font-family: "SF Mono", "Fira Code", monospace;
  }
  .mount-card-desc { font-size: 13px; color: var(--fg2); margin-top: 4px; }

  .empty {
    text-align: center; padding: 40px; color: var(--fg3);
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; max-width: 720px; width: 100%;
  }
  .empty code {
    color: var(--fg2); font-size: 12px;
    font-family: "SF Mono", "Fira Code", monospace;
    background: var(--bg3); padding: 2px 6px; border-radius: 4px;
  }
</style>
</head>
<body>
  <nav>
    <a class="brand" id="brand">pi</a>
    <div class="nav-links" id="nav-links"></div>
  </nav>
  <div class="content">
    <div class="home" id="home">
      <h1>pi</h1>
      <p>web server</p>
      <div class="mount-grid" id="mount-grid">
        <div class="empty"><p>Loading…</p></div>
      </div>
    </div>
    <iframe id="frame" class="hidden" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals"></iframe>
  </div>

<script>
(() => {
  const navLinks = document.getElementById("nav-links");
  const frame = document.getElementById("frame");
  const home = document.getElementById("home");
  const mountGrid = document.getElementById("mount-grid");
  const brand = document.getElementById("brand");

  let mounts = [];
  let activePrefix = null;

  // ── Hash-based routing ──────────────────────────────

  function getHashPath() {
    const h = location.hash.slice(1); // remove #
    return h || null;
  }

  function setHashPath(p) {
    const newHash = p ? "#" + p : "#";
    if (location.hash !== newHash) {
      history.replaceState(null, "", newHash);
    }
  }

  // ── Navigation ──────────────────────────────────────

  function navigate(prefix) {
    if (!prefix) {
      // Go home
      activePrefix = null;
      frame.classList.add("hidden");
      frame.src = "about:blank";
      home.classList.remove("hidden");
      setHashPath(null);
      updateActiveLink();
      document.title = "pi";
      return;
    }

    activePrefix = prefix;
    home.classList.add("hidden");
    frame.classList.remove("hidden");
    frame.src = prefix;
    setHashPath(prefix);
    updateActiveLink();

    // Update title
    const m = mounts.find(m => m.prefix === prefix);
    if (m) document.title = `${m.label} — pi`;
  }

  function updateActiveLink() {
    for (const link of navLinks.querySelectorAll(".nav-link")) {
      const prefix = link.dataset.prefix;
      link.classList.toggle("active", prefix === activePrefix);
    }
  }

  // ── Track iframe navigation for deep linking ────────

  function syncHashFromIframe() {
    try {
      const iframePath = frame.contentWindow.location.pathname;
      const iframeSearch = frame.contentWindow.location.search;
      if (iframePath && iframePath !== "about:blank") {
        setHashPath(iframePath + iframeSearch);

        // Update active nav based on iframe path
        const matchingMount = mounts.find(m =>
          iframePath === m.prefix || iframePath.startsWith(m.prefix + "/")
        );
        if (matchingMount && matchingMount.prefix !== activePrefix) {
          activePrefix = matchingMount.prefix;
          updateActiveLink();
          document.title = `${matchingMount.label} — pi`;
        }
      }
    } catch (e) {
      // Cross-origin or not loaded yet — ignore
    }
  }

  frame.addEventListener("load", syncHashFromIframe);

  // ── Render nav links ────────────────────────────────

  function renderNav() {
    navLinks.innerHTML = "";
    for (const m of mounts) {
      const a = document.createElement("a");
      a.className = "nav-link";
      a.textContent = m.label;
      a.dataset.prefix = m.prefix;
      a.addEventListener("click", (e) => {
        e.preventDefault();
        navigate(m.prefix);
      });
      navLinks.appendChild(a);
    }
    updateActiveLink();
  }

  // ── Render home cards ───────────────────────────────

  function renderHome() {
    if (mounts.length === 0) {
      mountGrid.innerHTML = `<div class="empty">
        <p>No extensions mounted</p>
        <p>Use <code>/web</code> in the TUI to start</p>
      </div>`;
      return;
    }

    mountGrid.innerHTML = "";
    for (const m of mounts) {
      const card = document.createElement("a");
      card.className = "mount-card";
      card.innerHTML = `
        <div class="mount-card-name">${esc(m.label)}</div>
        <div class="mount-card-prefix">${esc(m.prefix)}</div>
        ${m.description ? `<div class="mount-card-desc">${esc(m.description)}</div>` : ""}
      `;
      card.addEventListener("click", (e) => {
        e.preventDefault();
        navigate(m.prefix);
      });
      mountGrid.appendChild(card);
    }
  }

  // ── Brand click → home ──────────────────────────────

  brand.addEventListener("click", (e) => {
    e.preventDefault();
    navigate(null);
  });

  // ── Hash change handler ─────────────────────────────

  window.addEventListener("hashchange", () => {
    const hashPath = getHashPath();
    if (!hashPath) {
      if (activePrefix) navigate(null);
      return;
    }

    // Find the matching mount for this hash path
    const matchingMount = mounts.find(m =>
      hashPath === m.prefix || hashPath.startsWith(m.prefix + "/")
    );

    if (matchingMount) {
      if (hashPath !== activePrefix) {
        activePrefix = matchingMount.prefix;
        home.classList.add("hidden");
        frame.classList.remove("hidden");
        frame.src = hashPath;
        updateActiveLink();
        document.title = `${matchingMount.label} — pi`;
      }
    } else {
      navigate(null);
    }
  });

  // ── Init ────────────────────────────────────────────

  async function init() {
    try {
      const res = await fetch("/_api/mounts/dashboard");
      const allMounts = await res.json();

      // Filter out the nav shell itself (prefix "/")
      mounts = allMounts.filter(m => m.prefix !== "/");

      renderNav();
      renderHome();

      // Check initial hash — navigate to it if present
      const hashPath = getHashPath();
      if (hashPath) {
        const matchingMount = mounts.find(m =>
          hashPath === m.prefix || hashPath.startsWith(m.prefix + "/")
        );
        if (matchingMount) {
          activePrefix = matchingMount.prefix;
          home.classList.add("hidden");
          frame.classList.remove("hidden");
          frame.src = hashPath;
          updateActiveLink();
          document.title = `${matchingMount.label} — pi`;
        }
      }
    } catch (e) {
      mountGrid.innerHTML = `<div class="empty"><p>Failed to load mounts</p></div>`;
    }
  }

  // Periodically refresh mount list (extensions can mount/unmount at runtime)
  let refreshTimer = null;
  async function refreshMounts() {
    try {
      const res = await fetch("/_api/mounts/dashboard");
      const allMounts = await res.json();
      const newMounts = allMounts.filter(m => m.prefix !== "/");

      // Only re-render if mounts changed
      const oldKeys = mounts.map(m => m.prefix).sort().join(",");
      const newKeys = newMounts.map(m => m.prefix).sort().join(",");
      if (oldKeys !== newKeys) {
        mounts = newMounts;
        renderNav();
        renderHome();
      }
    } catch {}
  }

  init().then(() => {
    refreshTimer = setInterval(refreshMounts, 5000);
  });

  function esc(s) {
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }
})();
</script>
</body>
</html>
